<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מחולל מבחנים - התחלת מימוש</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Rubik', system-ui, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
        .container { max-width: 900px; margin: 0 auto; padding: 2rem 1rem; }
        .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 1.25rem; margin-bottom: 1rem; }
        h1, h2 { margin-top: 0; }
        label { display: block; margin-bottom: 0.4rem; font-weight: 500; }
        input, button, textarea { font: inherit; }
        input[type="file"], input[type="text"] { width: 100%; margin-bottom: 0.8rem; }
        .actions { display: flex; gap: 0.6rem; flex-wrap: wrap; }
        button { border: 0; border-radius: 8px; padding: 0.7rem 1rem; cursor: pointer; background: #2563eb; color: #fff; }
        button.secondary { background: #334155; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { margin-top: 0.7rem; color: #475569; min-height: 1.2rem; }
        .question-card { border: 1px solid #e2e8f0; border-radius: 10px; padding: 0.8rem; margin-bottom: 0.7rem; background: #fff; }
        .question-card ul { margin: 0.4rem 0 0 0; padding-inline-start: 1.2rem; }
    </style>
</head>
<body>
    <main class="container">
        <section class="card">
            <h1>מחולל מבחנים - התחלת מימוש</h1>
            <p>גרסה ראשונית: טעינת PDF + CSV, חילוץ שאלות/תשובות והצגת תצוגה מקדימה.</p>
        </section>

        <section class="card">
            <h2>קלט</h2>
            <label for="pdf-file">קובץ מבחן PDF</label>
            <input id="pdf-file" type="file" accept="application/pdf">

            <label for="csv-file">קובץ תשובות CSV</label>
            <input id="csv-file" type="file" accept=".csv,text/csv">

            <label for="form-number">מספר שאלון</label>
            <input id="form-number" type="text" placeholder="לדוגמה: 76">

            <div class="actions">
                <button id="parse-btn">Run Parse</button>
                <button id="download-btn" class="secondary" disabled>Download questions.json</button>
            </div>
            <div id="status" class="status"></div>
        </section>

        <section class="card">
            <h2>Preview</h2>
            <div id="preview"></div>
        </section>
    </main>

    <script type="module" src="generator.js"></script>
</body>
</html>
